<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Nueva Compra | ZON@MOVIL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
      :root {
        --primary: #4a00e0;
        --secondary: #8e2de2;
        --accent: #10b981;
        --card-bg: rgba(255, 255, 255, 0.15);
      }
      body {
        min-height: 100vh;

        background: linear-gradient(
          135deg,
          var(--secondary),
          var(--primary),
          var(--accent)
        );

        background-size: 300% 300%;

        animation: gradientMove 15s ease infinite;

        color: white;

        font-family: "Poppins", sans-serif;

        margin: 0;
      }
      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }
      .contenedor {
        display: grid;

        grid-template-columns: 420px 1fr;

        gap: 24px;

        align-items: start;
      }
      .grid-compra {
        display: grid;

        grid-template-columns: 450px 1fr;

        gap: 30px;

        align-items: start;
      }
      .card {
        background: rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        border-radius: 24px;

        padding: 22px;

        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        gap: 20px;
        flex-wrap: wrap;
      }

      .header h1 {
        font-size: 32px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .btn-back {
        width: auto;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        backdrop-filter: blur(10px);
      }

      .btn-back:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .select2-container {
        width: 100% !important;
      }

      .select2-container--default .select2-selection--single {
        height: 52px !important;

        border-radius: 14px !important;

        border: 1px solid rgba(255, 255, 255, 0.18) !important;

        background: rgba(0, 0, 0, 0.18) !important;

        display: flex !important;

        align-items: center !important;

        padding: 0 10px !important;

        transition: 0.3s;
      }

      .select2-container--default .select2-selection--single:hover {
        border-color: #8e2de2 !important;
      }

      .select2-container--default.select2-container--focus
        .select2-selection--single {
        border-color: #10b981 !important;

        box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
      }

      .select2-selection__rendered {
        color: white !important;

        line-height: 48px !important;

        font-weight: 500;
      }

      .select2-selection__placeholder {
        color: #cbd5e1 !important;
      }

      .select2-selection__arrow {
        height: 50px !important;
      }

      .select2-dropdown {
        background: #1e293b !important;

        border-radius: 14px !important;

        border: none !important;

        overflow: hidden;
      }

      .select2-search__field {
        background: rgba(255, 255, 255, 0.08) !important;

        color: white !important;

        border: none !important;

        border-radius: 10px !important;

        padding: 10px !important;
      }

      .select2-results__option {
        padding: 12px !important;

        color: white !important;
      }

      .select2-results__option--highlighted {
        background: #4a00e0 !important;
      }

      .select2-selection__rendered {
        color: white !important;
        line-height: 48px !important;
        padding-left: 10px !important;
      }

      .select2-dropdown {
        background: #1e293b !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
      }

      .select2-search__field {
        background: rgba(255, 255, 255, 0.08) !important;
        color: white !important;
      }

      .select2-results__option {
        color: white !important;
      }

      .select2-results__option--highlighted {
        background: #4a00e0 !important;
      }
      .select2-container--default
        .select2-selection--single
        .select2-selection__rendered {
        color: white !important;
        font-weight: 600;
      }

      .select2-results__option {
        color: white !important;
        background: #1e293b !important;
      }

      .select2-results__option--selected {
        background: #4a00e0 !important;
        color: white !important;
      }

      .select2-results__option--highlighted {
        background: #8e2de2 !important;
        color: white !important;
      }

      .select2-selection__arrow b {
        border-color: white transparent transparent transparent !important;
      }
      .form-group {
        margin-bottom: 10px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .form-group {
        margin-bottom: 6px;
      }

      label {
        margin-bottom: 4px;
        font-size: 13px;
      }

      .form-control {
        height: 40px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .card {
        padding: 18px;
      }

      .card h3 {
        margin-bottom: 14px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: #cbd5e1;
      }
      .form-control {
        width: 100%;

        padding: 10px 12px;

        border-radius: 10px;

        border: 1px solid rgba(255, 255, 255, 0.15);

        background: rgba(0, 0, 0, 0.15);

        color: white;

        box-sizing: border-box;

        height: 44px;

        font-size: 14px;
      }
      .btn {
        width: auto;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-agregar {
        width: 100%;

        padding: 14px;

        border: none;

        border-radius: 14px;

        background: linear-gradient(135deg, #6a00ff, #b026ff);

        color: white;

        font-size: 18px;

        font-weight: 700;

        cursor: pointer;

        margin-top: 8px;
      }

      .btn-add:hover {
        transform: translateY(-2px);

        box-shadow: 0 15px 30px rgba(74, 0, 224, 0.45);
      }
      .btn-save {
        background: linear-gradient(135deg, #10b981, #059669);

        color: white;

        font-size: 1.05rem;

        padding: 14px 24px;

        border-radius: 14px;

        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.35);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th {
        text-align: left;
        padding: 12px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      }
      td {
        padding: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .total-box {
        font-size: 1.5rem;
        text-align: right;
        margin-top: 20px;
        padding: 15px;
        background: rgba(16, 185, 129, 0.1);
        border-radius: 10px;
        border: 1px solid var(--accent);
      }
      .grid-compra {
        display: grid;

        grid-template-columns: 450px 1fr;

        gap: 30px;

        align-items: start;
      }
      .card h2 {
        font-size: 20px;

        margin-bottom: 20px;
      }
      .main-content {
        padding: 20px 30px;
      }
      select.form-control {
        appearance: none;
        background: rgba(0, 0, 0, 0.18);
        color: white;
        font-weight: 600;
      }

      select.form-control option {
        background: #2d1b69;
        color: white;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <script src="/utils/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <div class="container">
      <div class="header">
        <button
          class="btn btn-back"
          onclick="window.location = 'dashboard.html'"
        >
          <i class="fa fa-arrow-left"></i>
        </button>

        <h1>
          <i class="fas fa-cart-shopping"></i>
          Registro de Compra
        </h1>

        <div></div>
      </div>

      <div class="grid-compra">
        <div class="card">
          <h3><i class="fa fa-tag"></i> Agregar Producto</h3>
          <div class="form-group">
            <label>Proveedor</label>
            <select id="id_proveedor" class="form-control">
              <option></option>
            </select>
          </div>
          <hr style="opacity: 0.1; margin: 20px 0" />
          <div class="form-grid">
            <div class="form-group">
              <label>Marca</label>
              <input
                type="text"
                id="marca"
                class="form-control"
                placeholder="Apple, Samsung..."
              />
            </div>

            <div class="form-group">
              <label>Modelo</label>
              <input
                type="text"
                id="modelo"
                class="form-control"
                placeholder="iPhone 14 Pro"
              />
            </div>

            <div class="form-group">
              <label>Color</label>
              <input
                type="text"
                id="color"
                class="form-control"
                placeholder="Blanco"
              />
            </div>

            <div class="form-group">
              <label>Capacidad</label>
              <input
                type="text"
                id="capacidad"
                class="form-control"
                placeholder="256GB"
              />
            </div>

            <div class="form-group">
              <label>Tipo SIM</label>

              <select id="tipo_sim" class="form-control">
                <option value="fisico">Físico</option>

                <option value="esim">eSIM</option>

                <option value="dual">Dual SIM</option>
              </select>
            </div>

            <div class="form-group">
              <label>IMEI</label>

              <input
                type="text"
                id="imei"
                class="form-control"
                placeholder="356789123456789"
              />
            </div>

            <div class="form-group">
              <label>Sucursal destino</label>

              <select id="id_sucursal" class="form-control"></select>
            </div>
            <div class="form-group">
              <label>Precio Compra</label>

              <input
                type="text"
                id="precio_compra"
                class="form-control"
                placeholder="$0.00"
              />
            </div>
            <div class="form-group">
              <label>% Ganancia</label>

              <input
                type="number"
                id="ganancia"
                class="form-control"
                placeholder="15"
              />
            </div>

            <div class="form-group">
              <label>Precio Venta</label>

              <input
                type="text"
                id="precio_venta"
                class="form-control"
                placeholder="$0.00"
              />
            </div>
          </div>

          <button class="btn-agregar" onclick="agregarAlCarrito()">
            <i class="fa fa-plus"></i>

            Añadir a la lista
          </button>
        </div>

        <div class="card">
          <h3><i class="fa fa-list"></i> Detalle de la Compra</h3>
          <table>
            <thead>
              <tr>
                <th>Equipo</th>
                <th>P. Compra</th>
                <th>P. Venta</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="carrito"></tbody>
          </table>

          <div id="totalDiv" class="total-box">Total: $0.00</div>
          <button
            class="btn btn-save"
            style="margin-top: 20px"
            onclick="finalizarCompra()"
          >
            <i class="fa fa-check-circle"></i> Procesar Compra
          </button>
        </div>
      </div>
    </div>

    <script>
      let carrito = [];
      let productoSeleccionado = null;
      const token = localStorage.getItem("token");

      // Cargar selects al iniciar
      window.onload = async () => {
        // ==============================
        // PROVEEDORES
        // ==============================

        const resProv = await fetch("/api/proveedores", {
          headers: {
            Authorization: "Bearer " + token,
          },
        });

        const proveedores = await resProv.json();

        document.getElementById("id_proveedor").innerHTML = proveedores

          .filter((p) => p.activo)

          .map(
            (p) => `
          <option value="${p.id_proveedor}">
              ${p.empresa}
          </option>
      `,
          )

          .join("");

        // ACTIVAR SELECT2 PROVEEDOR
        $("#id_proveedor").select2({
          placeholder: "Buscar proveedor...",

          allowClear: true,

          width: "100%",
        });

        // ==============================
        // SUCURSALES
        // ==============================

        const resSuc = await fetch("/api/sucursales-compras", {
          headers: {
            Authorization: "Bearer " + token,
          },
        });

        const sucursales = await resSuc.json();
        console.log(sucursales);

        document.getElementById("id_sucursal").innerHTML = sucursales

          .map(
            (s) => `
          <option value="${s.id_sucursal}">
              ${s.nombre}
          </option>
      `,
          )

          .join("");

        // ACTIVAR SELECT2 SUCURSAL
        $("#id_sucursal").select2({
          placeholder: "Selecciona sucursal",

          allowClear: false,

          width: "100%",
        });
      };
      function limpiarNumero(valor) {
        return Number(valor.toString().replace(/[^0-9.]/g, "")) || 0;
      }

      // =========================
      // FORMATO MONEDA
      // =========================

      function aplicarFormatoMoneda(idInput) {
        const input = document.getElementById(idInput);

        input.addEventListener("blur", () => {
          const valor = limpiarNumero(input.value);

          if (!valor) {
            input.value = "";

            return;
          }

          input.value = valor.toLocaleString("es-MX", {
            style: "currency",
            currency: "MXN",
          });
        });

        input.addEventListener("focus", () => {
          input.value = limpiarNumero(input.value) || "";
        });
      }

      aplicarFormatoMoneda("precio_compra");

      aplicarFormatoMoneda("precio_venta");
      // =========================
      // CALCULAR GANANCIA
      // =========================

      document.getElementById("ganancia").addEventListener("input", () => {
        const compra = limpiarNumero(
          document.getElementById("precio_compra").value,
        );

        const ganancia = Number(document.getElementById("ganancia").value) || 0;

        if (!compra) return;

        const venta = compra + (compra * ganancia) / 100;

        document.getElementById("precio_venta").value = venta.toLocaleString(
          "es-MX",
          {
            style: "currency",
            currency: "MXN",
          },
        );
      });
      function seleccionarProducto(id, nombre) {
        productoSeleccionado = {
          id_producto: id,
          nombre: nombre,
        };

        buscarProducto.value = nombre;

        resultadosProductos.innerHTML = "";
      }

      async function agregarAlCarrito() {
        const id_proveedor = document.getElementById("id_proveedor").value;

        const marca = document.getElementById("marca").value.trim();

        const modelo = document.getElementById("modelo").value.trim();

        const color = document.getElementById("color").value.trim();

        const capacidad = document.getElementById("capacidad").value.trim();

        const tipo_sim = document.getElementById("tipo_sim").value;

        const imei = document.getElementById("imei").value.trim();

        const id_sucursal = document.getElementById("id_sucursal").value;

        const precio_compra = limpiarNumero(
          document.getElementById("precio_compra").value,
        );

        const precio_venta = limpiarNumero(
          document.getElementById("precio_venta").value,
        );

        // =========================
        // VALIDACIONES
        // =========================

        if (
          !id_proveedor ||
          !marca ||
          !modelo ||
          !color ||
          !capacidad ||
          !tipo_sim ||
          !imei ||
          !id_sucursal ||
          !precio_compra ||
          !precio_venta
        ) {
          return Swal.fire({
            icon: "warning",
            title: "Campos incompletos",
            text: "Debes llenar todos los campos",
          });
        }

        // =========================
        // VALIDAR IMEI
        // =========================

        if (!/^\d{15}$/.test(imei)) {
          return Swal.fire({
            icon: "warning",
            title: "IMEI inválido",
            text: "El IMEI debe contener exactamente 15 dígitos",
          });
        }

        // =========================
        // VALIDAR DUPLICADO EN BD
        // =========================

        const validar = await fetch(`/api/compras/validar-imei/${imei}`, {
          headers: {
            Authorization: "Bearer " + token,
          },
        });

        const dataImei = await validar.json();

        if (dataImei.existe) {
          return Swal.fire({
            icon: "error",
            title: "IMEI duplicado",
            text: "Ese IMEI ya existe en inventario",
          });
        }

        // =========================
        // AGREGAR AL CARRITO
        // =========================

        carrito.push({
          marca,
          modelo,
          color,
          capacidad,
          tipo_sim,
          imei,
          id_sucursal,
          precio_compra,
          precio_venta,
        });

        renderCarrito();

        Swal.fire({
          icon: "success",
          title: "Equipo agregado",
          timer: 1200,
          showConfirmButton: false,
        });

        // =========================
        // LIMPIAR CAMPOS
        // =========================

        document.getElementById("marca").value = "";
        document.getElementById("modelo").value = "";
        document.getElementById("color").value = "";
        document.getElementById("capacidad").value = "";
        document.getElementById("imei").value = "";
        document.getElementById("precio_compra").value = "";
        document.getElementById("precio_venta").value = "";
        document.getElementById("ganancia").value = "";
      }
      function limpiarFormulario() {
        document.getElementById("marca").value = "";

        document.getElementById("modelo").value = "";

        document.getElementById("color").value = "";

        document.getElementById("capacidad").value = "";

        document.getElementById("imei").value = "";

        document.getElementById("precio_compra").value = "";

        document.getElementById("precio_venta").value = "";
      }
      function renderCarrito() {
        const tbody = document.getElementById("carrito");

        let total = 0;

        tbody.innerHTML = carrito
          .map((e, index) => {
            total += Number(e.precio_compra);

            return `
                <tr>

                    <td>
                        ${e.marca}
                        ${e.modelo}
                        ${e.color}
                        ${e.capacidad}

                        <br>

                        <small style="color:#94a3b8;">
                            IMEI:
                            ${e.imei}
                        </small>
                    </td>

                    <td>
                        $${Number(e.precio_compra).toFixed(2)}
                    </td>

                    <td>
                        $${Number(e.precio_venta).toFixed(2)}
                    </td>

                    <td>
                        <button
                            onclick="eliminarDelCarrito(${index})"
                            style="
                                background:none;
                                border:none;
                                color:#f87171;
                                cursor:pointer;
                            "
                        >
                            <i class="fa fa-times"></i>
                        </button>
                    </td>

                </tr>
            `;
          })
          .join("");

        totalDiv.innerText = `Total: $${total.toFixed(2)}`;
      }

      function eliminarDelCarrito(index) {
        carrito.splice(index, 1);
        renderCarrito();
      }

      async function finalizarCompra() {
        if (carrito.length === 0)
          return Swal.fire("Carrito vacío", "", "warning");

        const res = await fetch("/api/compras", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify({
            id_proveedor: document.getElementById("id_proveedor").value,
            equipos: carrito,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          Swal.fire(
            "¡Éxito!",
            "Compra procesada e inventario actualizado",
            "success",
          ).then(() => {
            window.open(
              `ticket_compra.html?id=${data.id_compra}`,

              "_blank",
            );

            location.reload();
          });
        }
      }
    </script>
  </body>
</html>
