<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ticket Venta</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #ececec;
        padding: 30px;
      }

      .ticket {
        width: 800px;
        margin: auto;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .header {
        background: linear-gradient(135deg, #4b00ff, #a200ff);
        color: white;
        padding: 35px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 42px;
        font-weight: bold;
      }

      .folio {
        text-align: right;
      }

      .folio h2 {
        font-size: 40px;
      }

      .folio p {
        margin-top: 10px;
        font-size: 18px;
      }

      .content {
        padding: 40px;
      }

      .info {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 35px;
      }

      .card {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 15px;
      }

      .card h3 {
        color: #4b00ff;
        margin-bottom: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      thead {
        background: #5f00ff;
        color: white;
      }

      th,
      td {
        padding: 16px;
        text-align: center;
      }

      tbody tr {
        border-bottom: 1px solid #ddd;
      }

      .total {
        text-align: right;
        margin-top: 30px;
        font-size: 28px;
        font-weight: bold;
        color: #4b00ff;
      }

      .metodo {
        margin-top: 15px;
        text-align: right;
        font-size: 18px;
        color: #666;
      }

      .btn-print {
        width: 100%;
        margin-top: 30px;
        border: none;
        padding: 18px;
        border-radius: 14px;
        background: #10b981;
        color: white;
        font-size: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      .footer {
        text-align: center;
        margin-top: 35px;
        color: #666;
        font-size: 18px;
      }

      @media print {
        body {
          background: white;
          padding: 0;
        }

        .btn-print {
          display: none;
        }

        .ticket {
          box-shadow: none;
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="ticket">
      <div class="header">
        <div class="logo">
          <i class="fa-solid fa-mobile-screen-button"></i>
          ZONA MÓVIL
        </div>

        <div class="folio">
          <h2 id="folio">VTA-000000</h2>
          <p id="fecha"></p>
        </div>
      </div>

      <div class="content">
        <div class="info">
          <div class="card">
            <h3>Cliente</h3>
            <p id="cliente"></p>
          </div>

          <div class="card">
            <h3>Vendido por</h3>
            <p id="usuario"></p>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Equipo</th>
              <th>IMEI</th>
              <th>Método</th>
              <th>P. Venta</th>
            </tr>
          </thead>

          <tbody id="detalleBody"></tbody>
        </table>

        <div class="total">Total: <span id="total"></span></div>

        <div class="metodo">
          Método de pago:
          <strong id="metodo_pago"></strong>
        </div>
        <div class="metodo">
          Tipo de venta:
          <strong id="tipo_venta"></strong>
        </div>

        <div class="metodo" id="infoEfectivo" style="display: none">
          Efectivo recibido:
          <strong id="efectivo_recibido"></strong>

          <br /><br />

          Cambio:
          <strong id="cambio"></strong>
        </div>

        <div class="metodo" id="infoApartado" style="display: none">
          Abono inicial:
          <strong id="abono_inicial"></strong>

          <br /><br />

          Saldo pendiente:
          <strong id="saldo_pendiente"></strong>

          <br /><br />

          Fecha límite:
          <strong id="fecha_limite"></strong>
        </div>

        <button class="btn-print" onclick="window.print()">
          <i class="fa-solid fa-print"></i>
          Imprimir Ticket
        </button>

        <div class="footer">Sistema ZONA MÓVIL</div>
      </div>
    </div>
    <script>
      const token = localStorage.getItem("token");

      async function cargarTicket() {
        const params = new URLSearchParams(window.location.search);

        const id = params.get("id");

        const res = await fetch(`/api/ventas/${id}`, {
          headers: {
            Authorization: "Bearer " + token,
          },
        });

        const data = await res.json();

        console.log(data);

        // =========================
        // DATOS VENTA
        // =========================

        document.getElementById("folio").innerText =
          data.venta.folio ||
          `VTA-${String(data.venta.id_venta).padStart(6, "0")}`;

        document.getElementById("fecha").innerText = new Date(
          data.venta.fecha_venta,
        ).toLocaleString("es-MX", {
          timeZone: "America/Mexico_City",
        });

        document.getElementById("cliente").innerText =
          data.venta.cliente || "Público General";

        document.getElementById("usuario").innerText =
          data.venta.usuario || "N/A";

        document.getElementById("total").innerText = Number(
          data.venta.total,
        ).toLocaleString("es-MX", {
          style: "currency",
          currency: "MXN",
        });

        document.getElementById("metodo_pago").innerText =
          data.venta.metodo_pago || "N/A";

        document.getElementById("tipo_venta").innerText =
          data.venta.tipo_venta || "contado";
        // =========================
        // EFECTIVO Y CAMBIO
        // =========================

        if (data.venta.metodo_pago === "Efectivo") {
          document.getElementById("infoEfectivo").style.display = "block";

          document.getElementById("efectivo_recibido").innerText = Number(
            data.venta.efectivo_recibido || 0,
          ).toLocaleString("es-MX", {
            style: "currency",
            currency: "MXN",
          });

          document.getElementById("cambio").innerText = Number(
            data.venta.cambio || 0,
          ).toLocaleString("es-MX", {
            style: "currency",
            currency: "MXN",
          });
        }

        if (data.venta.tipo_venta === "apartado") {
          document.getElementById("infoApartado").style.display = "block";

          document.getElementById("abono_inicial").innerText = Number(
            data.venta.abono_inicial,
          ).toLocaleString("es-MX", {
            style: "currency",
            currency: "MXN",
          });

          document.getElementById("saldo_pendiente").innerText = Number(
            data.venta.saldo,
          ).toLocaleString("es-MX", {
            style: "currency",
            currency: "MXN",
          });

          document.getElementById("fecha_limite").innerText = new Date(
            data.venta.fecha_limite,
          ).toLocaleDateString("es-MX");
        }

        // =========================
        // DETALLE
        // =========================

        document.getElementById("detalleBody").innerHTML = data.detalles
          .map(
            (item) => `
            <tr>

                <td>
                    ${item.marca}
                    ${item.modelo}
                    ${item.color || ""}
                    ${item.capacidad || ""}
                </td>

                <td>
                    ${item.numero_imei || item.imei || "N/A"}
                </td>

                <td>
                    ${data.venta.metodo_pago}
                </td>

                <td>
                    ${Number(item.precio_venta).toLocaleString("es-MX", {
                      style: "currency",
                      currency: "MXN",
                    })}
                </td>

            </tr>
        `,
          )
          .join("");
      }

      cargarTicket();
    </script>
  </body>
</html>
