<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes | ZON@MOVIL</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
      :root {
        --primary: #4a00e0;
        --secondary: #8e2de2;
        --accent: #2575fc;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --light: #f8fafc;
        --dark: #1e293b;
        --gray: #64748b;
        --light-gray: #e2e8f0;
        --card-bg: rgba(255, 255, 255, 0.15);
        --card-border: rgba(255, 255, 255, 0.25);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          var(--secondary),
          var(--primary),
          var(--accent)
        );
        background-size: 300% 300%;
        animation: gradientMove 15s ease infinite;
        color: white;
        overflow-x: hidden;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        max-width: 1400px;
        margin: auto;
        padding: 30px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 20px;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-actions {
        display: flex;
        gap: 15px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        border: none;
        outline: none;
      }

      .btn i {
        font-size: 14px;
      }

      .btn-back {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        backdrop-filter: blur(10px);
      }

      .btn-back:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateX(-3px);
      }

      .btn-primary {
        background: linear-gradient(45deg, var(--accent), var(--primary));
        color: white;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      }

      .btn-success {
        background: linear-gradient(45deg, var(--success), #059669);
        color: white;
      }

      .btn-danger {
        background: linear-gradient(45deg, var(--danger), #dc2626);
        color: white;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.5s ease;
        border: 1px solid var(--card-border);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .search-container {
        margin-bottom: 25px;
        position: relative;
      }

      .search-container i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.7);
      }

      .search-input {
        width: 100%;
        padding: 12px 20px 12px 45px;
        border-radius: 12px;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        font-size: 14px;
        transition: all 0.3s;
        backdrop-filter: blur(5px);
      }

      .search-input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
      }

      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      .table-responsive {
        overflow-x: auto;
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 15px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.1);
        position: sticky;
        top: 0;
        backdrop-filter: blur(5px);
      }

      td {
        padding: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.9);
      }

      tr:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .action-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
      }

      .action-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }

      .action-btn.edit {
        color: var(--accent);
      }

      .action-btn.delete {
        color: var(--danger);
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        z-index: 1000;
      }

      .modal-content {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 25px;
        padding: 30px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 0 40px rgba(138, 43, 226, 0.3),
          0 20px 60px rgba(0, 0, 0, 0.5);
        animation: modalShow 0.3s ease;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .modal-title {
        font-size: 24px;
        font-weight: 600;
        background: linear-gradient(90deg, #c084fc, #60a5fa);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .close-modal {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .close-modal:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        transform: rotate(90deg) scale(1.1);
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
      }

      .form-control {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .form-control:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow:
          0 0 10px rgba(139, 92, 246, 0.6),
          0 0 20px rgba(139, 92, 246, 0.3);
        background: rgba(255, 255, 255, 0.12);
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 25px;
      }

      @keyframes modalShow {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--dark);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 1000;
        opacity: 0;
        transition: all 0.3s;
      }

      .toast.show {
        opacity: 1;
        bottom: 50px;
      }

      .toast.success {
        background: var(--success);
      }

      .toast.error {
        background: var(--danger);
      }

      .toast.warning {
        background: var(--warning);
      }

      @media (max-width: 768px) {
        .container {
          padding: 20px;
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-actions {
          width: 100%;
          justify-content: space-between;
        }

        .modal-content {
          width: 90%;
          padding: 20px;
        }
      }

      /* Estilos para DataTables personalizados */
      .dataTables_wrapper .dataTables_paginate .paginate_button {
        color: white !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        background: rgba(255, 255, 255, 0.1) !important;
        border-radius: 12px !important;
        margin: 0 5px !important;
        padding: 5px 12px !important;
      }

      .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
        background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
      }

      .dataTables_wrapper .dataTables_paginate .paginate_button.current {
        background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.6) !important;
      }

      .dataTables_wrapper .dataTables_length,
      .dataTables_wrapper .dataTables_filter,
      .dataTables_wrapper .dataTables_info {
        color: white !important;
      }

      .dataTables_wrapper .dataTables_filter input {
        background: rgba(255, 255, 255, 0.15) !important;
        color: white !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 12px !important;
        padding: 5px 10px !important;
      }

      .dataTables_wrapper .dataTables_filter input:focus {
        outline: none;
        border-color: #8b5cf6 !important;
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.6) !important;
      }
      /* 🔥 SELECT DATATABLE */
      select,
      .dataTables_length select {
        background: rgba(255, 255, 255, 0.15) !important;
        color: white !important;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* 🔥 OPCIONES */
      select option {
        background: #1e1e2f;
        color: white;
      }

      /* 🔥 INPUT BUSCAR */
      .dataTables_filter input {
        background: rgba(255, 255, 255, 0.15) !important;
        color: white !important;
        border-radius: 8px;
        border: none;
        padding: 5px 10px;
      }

      /* 🔥 TEXTOS DATATABLE */
      .dataTables_info,
      .dataTables_length,
      .dataTables_filter,
      .dataTables_paginate {
        color: white !important;
      }

      /* 🔥 PAGINACIÓN */
      .dataTables_paginate .paginate_button {
        color: white !important;
      }

      select {
        appearance: none;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <script src="utils/auth.js"></script>
    <div class="container">
      <div class="header">
        <button
          class="btn btn-back"
          onclick="window.location = 'dashboard.html'"
        >
          <i class="fa fa-arrow-left"></i> Volver
        </button>

        <h1><i class="fas fa-users"></i> Clientes</h1>

        <div class="header-actions">
          <button class="btn btn-primary" onclick="abrirModal()">
            <i class="fa fa-plus"></i> Nuevo Cliente
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-responsive">
          <table id="tablaClientes">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Sucursal</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <!-- Datos se cargarán dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal para nuevo cliente -->
    <div class="modal" id="modalCliente">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">
            <i class="fas fa-user-plus"></i> Nuevo Cliente
          </h2>
          <button class="close-modal" onclick="cerrarModal()">&times;</button>
        </div>

        <form id="formCliente">
          <div class="form-group">
            <label>Nombre *</label>
            <input
              type="text"
              class="form-control"
              id="nombre"
              placeholder="Nombre completo"
              required
            />
          </div>

          <div class="form-group">
            <label>Teléfono</label>
            <input
              type="text"
              class="form-control"
              id="telefono"
              placeholder="Número de teléfono"
            />
          </div>

          <div class="form-group">
            <label>Dirección</label>
            <input
              type="text"
              class="form-control"
              id="direccion"
              placeholder="Dirección completa"
            />
          </div>

          <div class="modal-footer">
            <button type="button" class="btn" onclick="cerrarModal()">
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary">
              Guardar Cliente
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      let clientes = [];
      let dataTable = null;
      let editandoId = null;
      const toast = document.getElementById("toast");

      function showToast(msg, type = "success") {
        toast.textContent = msg;
        toast.className = "toast show " + type;
        setTimeout(() => (toast.className = "toast"), 3000);
      }

      async function cargarClientes() {
        try {
          const token = localStorage.getItem("token");
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 5000);

          const res = await fetch("http://localhost:3000/api/clientes", {
            headers: {
              Authorization: "Bearer " + token,
            },
            signal: controller.signal,
          });

          clearTimeout(timeoutId);

          if (!res.ok)
            throw new Error(`Error ${res.status}: ${res.statusText}`);

          const data = await res.json();
          clientes = data;
          renderizarTabla(data);
        } catch (error) {
          console.error("Error cargando clientes:", error);
          showToast(
            error.message.includes("aborted")
              ? "La solicitud tardó demasiado"
              : "Error cargando clientes",
            "error",
          );
        }
      }

      function renderizarTabla(data) {
        const user = JSON.parse(localStorage.getItem("user"));

        // 🔥 destruir tabla anterior
        if ($.fn.DataTable.isDataTable("#tablaClientes")) {
          $("#tablaClientes").DataTable().destroy();
        }

        $("#tablaClientes").DataTable({
          destroy: true,

          data: data,

          columns: [
            {
              data: "nombre",
            },

            {
              data: "telefono",
              render: (data) => data || "-",
            },

            {
              data: "direccion",
              render: (data) => data || "-",
            },

            ...(user.id_rol === 1
              ? [
                  {
                    data: "sucursal",
                    render: (data) => data || "-",
                  },
                ]
              : []),

            {
              data: null,
              orderable: false,
              render: function (data) {
                return `
                        <div class="actions">

                            <button
                                class="action-btn edit"
                                onclick="editarCliente(${data.id_cliente})"
                            >
                                <i class="fas fa-edit"></i>
                            </button>

                            <button
                                class="action-btn delete"
                                onclick="confirmarEliminacion(${data.id_cliente})"
                            >
                                <i class="fas fa-trash"></i>
                            </button>

                        </div>
                    `;
              },
            },
          ],

          pageLength: 5,

          lengthMenu: [5, 10, 25, 50],

          deferRender: true,

          processing: true,

          language: {
            search: "Buscar:",
            lengthMenu: "Mostrar _MENU_",
            info: "Mostrando _START_ a _END_ de _TOTAL_",
            paginate: {
              next: "Siguiente",
              previous: "Anterior",
            },
          },
        });
      }

      function abrirModal() {
        limpiarFormulario();
        document.getElementById("modalCliente").style.display = "flex";
        document.getElementById("nombre").focus();
      }

      function cerrarModal() {
        limpiarFormulario();
        document.getElementById("modalCliente").style.display = "none";
        editandoId = null;
      }

      function limpiarFormulario() {
        document.getElementById("nombre").value = "";
        document.getElementById("telefono").value = "";
        document.getElementById("direccion").value = "";
      }

      async function editarCliente(id) {
        const cliente = clientes.find((c) => c.id_cliente == id);
        if (!cliente) return;

        editandoId = id;
        abrirModal();

        document.getElementById("nombre").value = cliente.nombre || "";
        document.getElementById("telefono").value = cliente.telefono || "";
        document.getElementById("direccion").value = cliente.direccion || "";
      }

      async function confirmarEliminacion(id) {
        Swal.fire({
          title: "¿Estás seguro?",
          text: "¡Este cliente será eliminado permanentemente!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#3085d6",
          cancelButtonColor: "#d33",
          confirmButtonText: "Sí, eliminar",
          cancelButtonText: "Cancelar",
          background: "rgba(255, 255, 255, 0.95)",
          backdrop: "rgba(0, 0, 0, 0.5)",
        }).then((result) => {
          if (result.isConfirmed) {
            eliminarCliente(id);
          }
        });
      }

      async function eliminarCliente(id) {
        try {
          const token = localStorage.getItem("token");
          const response = await fetch(
            `http://localhost:3000/api/clientes/${id}`,
            {
              method: "DELETE",
              headers: {
                Authorization: "Bearer " + token,
              },
            },
          );

          if (response.ok) {
            showToast("Cliente eliminado correctamente", "success");
            cargarClientes();
          } else {
            const data = await response.json();
            showToast(data.message || "Error al eliminar", "error");
          }
        } catch (error) {
          console.error("Error:", error);
          showToast("Error de conexión", "error");
        }
      }

      document
        .getElementById("formCliente")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const nombre = document.getElementById("nombre").value.trim();
          const telefono = document.getElementById("telefono").value.trim();
          if (telefono && !/^\d+$/.test(telefono)) {
            return showToast(
              "El teléfono solo debe contener números",
              "warning",
            );
          }
          const direccion = document.getElementById("direccion").value.trim();

          if (!nombre) {
            return showToast("El nombre es obligatorio", "warning");
          }

          try {
            const token = localStorage.getItem("token");
            const url = editandoId
              ? `http://localhost:3000/api/clientes/${editandoId}`
              : "http://localhost:3000/api/clientes";

            const method = editandoId ? "PUT" : "POST";

            const res = await fetch(url, {
              method,
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
              body: JSON.stringify({ nombre, telefono, direccion }),
            });

            if (res.ok) {
              showToast(
                editandoId
                  ? "Cliente actualizado correctamente"
                  : "Cliente creado correctamente",
                "success",
              );
              cerrarModal();
              cargarClientes();
            } else {
              const data = await res.json();
              throw new Error(data.message || "Error al guardar");
            }
          } catch (error) {
            console.error("Error al guardar cliente:", error);
            showToast(error.message, "error");
          }
        });

      // Inicialización
      document.addEventListener("DOMContentLoaded", function () {
        cargarClientes();
      });
    </script>
  </body>
</html>
